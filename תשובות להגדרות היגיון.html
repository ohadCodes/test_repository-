<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1f2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="תשובות להגדרות היגיון" />
  <link rel="manifest" href="manifest.json" />
  <title>תשובות להגדרות היגיון</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f172a; --card-bg: #1e293b; --primary: #38bdf8; --secondary: #94a3b8;
      --text: #f8fafc; --accent: #f472b6; --success: #22c55e;
    }
    body {
      font-family: 'Rubik', sans-serif; background-color: var(--bg); color: var(--text);
      margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden;
    }
    .spinner {
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-left-color: var(--primary) !important;
        width: 45px; height: 45px; border-radius: 50%;
        animation: spin 1s linear infinite; display: inline-block;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #main-content-wrapper { transition: opacity 0.5s ease-in-out; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .search-container { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 15px 0; }
    .search-box { position: relative; display: flex; align-items: center; background: var(--card-bg); border-radius: 12px; padding: 5px 15px; border: 1px solid #334155; }
    .search-box input { background: transparent; border: none; color: white; padding: 12px; width: 100%; font-size: 16px; outline: none; }
    .card { background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 16px; border-right: 4px solid var(--primary); }
    .card-definition { font-weight: 700; font-size: 1.1rem; color: var(--primary); margin-bottom: 8px; }
    .card-solution { font-family: 'Frank Ruhl Libre', serif; font-size: 1.3rem; font-weight: 900; color: #fff; }
    .filter-bar { display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
    .filter-btn { background: #334155; border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; }
    .filter-btn.active { background: var(--primary); color: #0f172a; font-weight: 600; }
  </style>
</head>
<body>
<main class="container">
    <div id="loader" style="text-align: center; position: fixed; width: 100%; top: 40%; left: 0; z-index: 9999;">
        <div class="spinner"></div>
        <p style="color: var(--primary); margin-top: 15px; font-weight: bold;">טוען את כל ההגדרות...</p>
    </div>
    <div id="main-content-wrapper" style="display: none; opacity: 0;">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="חיפוש הגדרה או פתרון..." oninput="handleSearch(this.value)">
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">הכל</button>
                <button class="filter-btn" id="filter-no-explanation" onclick="setFilter('no-explanation')">ללא הסבר</button>
            </div>
        </div>
        <div id="list"></div>
    </div>
</main>
<script>
  
  let currentData = [...allData];
  let currentStart = 0;
  const pageSize = 50;
  let query = "";
  let searchField = "definition";

  const list = document.getElementById('riddleList');
  const info = document.getElementById('searchInfo');
  const loader = document.getElementById('loader');
  const wrapper = document.getElementById('main-content-wrapper');

  function highlightText(text, q) {
    if (!q) return text;
    const regex = new RegExp(`(${q})`, 'gi');
    return text.replace(regex, `<span class="highlight">$1</span>`);
  }

  function render(append = false) {
    const filtered = allData.filter(item => {
      const val = item[searchField].toLowerCase();
      return val.includes(query.toLowerCase());
    });

    if (!append) {
      currentStart = 0;
      list.innerHTML = "";
    }

    const nextBatch = filtered.slice(currentStart, currentStart + pageSize);
    
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><h3>לא נמצאו תוצאות</h3></div>`;
      info.style.display = 'none';
      return;
    }

    const html = nextBatch.map((e, idx) => `
      <div class="card" style="animation-delay:${idx * 0.05}s">
        <div class="card-header">
          <div class="card-definition">${searchField === 'definition' ? highlightText(e.definition, query) : e.definition}</div>
          <div class="card-solution">${searchField === 'solution' ? highlightText(e.solution, query) : e.solution}</div>
        </div>
      </div>
    `).join('');

    list.insertAdjacentHTML('beforeend', html);
    info.style.display = 'block';
    info.innerHTML = `מוצגים <b>${Math.min(currentStart + pageSize, filtered.length)}</b> מתוך <b>${filtered.length}</b>`;
    
    currentStart += pageSize;
  }

  // אירועי חיפוש וסינון
  document.getElementById('searchInput').addEventListener('input', (e) => {
    query = e.target.value;
    render();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.filter-btn.active').classList.remove('active');
      btn.classList.add('active');
      searchField = btn.dataset.field;
      render();
    });
  });

  // טעינה אינסופית
  window.addEventListener('scroll', () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
      const filteredCount = allData.filter(item => item[searchField].toLowerCase().includes(query.toLowerCase())).length;
      if (currentStart < filteredCount) {
        render(true);
      }
    }
  });

  // אתחול האתר וסגירת ה-Loader
  function init() {
    render();
    if (loader) loader.style.opacity = '0';
    setTimeout(() => {
        if (loader) loader.style.display = 'none';
        if (wrapper) wrapper.style.display = 'block';
    }, 500);
  }

  init();

</script>
</body>
</html>
